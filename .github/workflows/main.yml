name: Restore Streak
on: push # This runs when you save this file

jobs:
  backdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create backdated commit
        run: |
          git config --global user.name "zeeshan020dev"
          git config --global user.email "zeeshanislam015@gmail.com"
          export GIT_AUTHOR_DATE="2026-03-25T05:00:00"
          export GIT_COMMITTER_DATE="2026-03-25T05:00:00"
          git commit --allow-empty -m "Restoring streak"
          git push
