name: Restore Streak
on: workflow_dispatch # This lets you trigger it manually with a button

jobs:
  backdate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can push back

      - name: Create backdated commit
        run: |
          git config --global user.name "zeeshan020dev"
          git config --global user.email "zeeshanislam015@gmail.com"
          
          # Set the date to March 26, 2026
          export GIT_AUTHOR_DATE="2026-03-25T12:00:00"
          export GIT_COMMITTER_DATE="2026-03-25T12:00:00"
          
          git commit --allow-empty -m "Restoring streak momentum"
          git push origin main
